name: 'Setup canvas native dependencies'
description: 'Install apt packages required to build node-canvas on Ubuntu runners'

runs:
  using: composite
  steps:
    - name: Install dependencies for canvas
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          python3 \
          pkg-config \
          libcairo2-dev \
          libpango1.0-dev \
          libjpeg-dev \
          libgif-dev \
          librsvg2-dev
