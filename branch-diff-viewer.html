    * { box-sizing: border-box; }
    body {

      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
    }
    .gh-header {

      top: 0;
      z-index: 2;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .gh-header h1 {

      font-size: 20px;
      font-weight: 600;
    }
    .gh-header .sub {
      color: var(--muted);
      font-size: 13px;
    }
    .gh-header code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: #eff2f5;
      padding: 2px 6px;
      border-radius: 6px;
    }
    .file {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin: 16px 24px;
      overflow: hidden;
    }
    .file-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
    }
    .file-header .path { flex: 1; word-break: break-all; }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    table.diff-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 20px;
    }
    .diff-table td {
      vertical-align: top;
      padding: 0;
      border: none;
    }
    .num {
      width: 1%;
      padding: 0 8px 0 16px !important;
      text-align: right;
      color: var(--muted);
      user-select: none;
      background: var(--header-bg);
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }
    .num:nth-of-type(2) {
      border-left: none;
    }
    .code {
      padding: 0 16px 0 10px !important;
      white-space: pre;
      overflow-x: auto;
      width: 99%;
    }
    tr.row-add .code { background: var(--add-bg); }
    tr.row-del .code { background: var(--del-bg); }
    tr.row-ctx .code { background: var(--bg); }
    tr.hunk-row td {
      background: var(--hunk-bg);
      color: var(--muted);
      font-weight: 600;
      padding: 4px 16px !important;
      font-size: 11px;
    }
    .empty { color: transparent; }
    .stats { padding: 0 24px 24px; color: var(--muted); font-size: 13px; }
  </style>

    function esc(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function parseDiff(text) {
      const files = [];
      const lines = text.split(/\n/);
      let i = 0;
      let file = null;
      let hunkLines = [];
      let hunkMeta = null;

      function flushHunk() {
        if (!file || !hunkMeta) return;
        file.hunks.push({ meta: hunkMeta, lines: hunkLines });
        hunkLines = [];
        hunkMeta = null;
      }

      function flushFile() {
        flushHunk();
        if (file) files.push(file);
        file = null;
      }

      while (i < lines.length) {
        const line = lines[i];
        if (line.startsWith('diff --git ')) {
          flushFile();
          const m = line.match(/^diff --git a\/(.+?) b\/(.+)$/);
          file = { path: m ? m[2] : line.slice(11), hunks: [] };
          i++;
          continue;
        }
        if (!file) {
          i++;
          continue;
        }
        if (line.startsWith('new file mode') || line.startsWith('deleted file mode') || line.startsWith('similarity index') || line.startsWith('rename from') || line.startsWith('rename to') || line.startsWith('Binary files')) {
          i++;
          continue;
        }
        if (line.startsWith('index ')) {
          i++;
          continue;
        }
        if (line.startsWith('--- ') || line.startsWith('+++ ')) {
          i++;
          continue;
        }
        if (line.startsWith('@@')) {
          flushHunk();
          const m = line.match(/^@@ -(\d+)(?:,(\d+))? \+(\d+)(?:,(\d+))? @@(.*)$/);
          if (m) {
            hunkMeta = {
              header: line,
              oldStart: parseInt(m[1], 10),
              oldCount: m[2] ? parseInt(m[2], 10) : 1,
              newStart: parseInt(m[3], 10),
              newCount: m[4] ? parseInt(m[4], 10) : 1,
            };
          } else {
            hunkMeta = { header: line, oldStart: 1, oldCount: 0, newStart: 1, newCount: 0 };
          }
          i++;
          continue;
        }
        if (hunkMeta && (line.startsWith('\\') || line.startsWith('-') || line.startsWith('+') || line.startsWith(' '))) {
          hunkLines.push(line);
          i++;
          continue;
        }
        i++;
      }
      flushFile();
      return files;
    }

    function expandHunk(hunk) {
      const rows = [];
      let o = hunk.meta.oldStart;
      let n = hunk.meta.newStart;
      for (const line of hunk.lines) {
        if (line.startsWith('\\')) continue;
        const c = line[0];
        const content = line.slice(1);
        if (c === ' ') {
          rows.push({ type: 'ctx', old: o, neu: n, content });
          o++;
          n++;
        } else if (c === '-') {
          rows.push({ type: 'del', old: o, neu: '', content });
          o++;
        } else if (c === '+') {
          rows.push({ type: 'add', old: '', neu: n, content });
          n++;
        }
      }
      return rows;
    }

    function render() {
      const files = parseDiff(RAW_DIFF);
      let add = 0, del = 0;
      const root = document.getElementById('root');
      root.innerHTML = '';

      for (const f of files) {
        for (const h of f.hunks) {
          for (const line of h.lines) {
            if (line[0] === '+') add++;
            else if (line[0] === '-') del++;
          }
        }
      }

      document.getElementById('statLine').textContent = ' · ' + files.length + ' file(s) changed, ' + add + ' insertions(+), ' + del + ' deletions(-)';

      for (const f of files) {
        const section = document.createElement('section');
        section.className = 'file';
        const fh = document.createElement('div');
        fh.className = 'file-header';
        fh.innerHTML = '<span class="path">' + esc(f.path) + '</span><span class="badge">DIFF</span>';
        section.appendChild(fh);

        const table = document.createElement('table');
        table.className = 'diff-table';

        for (const hunk of f.hunks) {
          const hr = document.createElement('tr');
          hr.className = 'hunk-row';
          const td = document.createElement('td');
          td.colSpan = 3;
          td.textContent = hunk.meta.header;
          hr.appendChild(td);
          table.appendChild(hr);

          for (const row of expandHunk(hunk)) {
            const tr = document.createElement('tr');
            tr.className = row.type === 'add' ? 'row-add' : row.type === 'del' ? 'row-del' : 'row-ctx';
            const tdO = document.createElement('td');
            tdO.className = 'num';
            tdO.textContent = row.old === '' ? '' : String(row.old);
            const tdN = document.createElement('td');
            tdN.className = 'num';
            tdN.textContent = row.neu === '' ? '' : String(row.neu);
            const tdC = document.createElement('td');
            tdC.className = 'code';
            tdC.textContent = row.content;
            tr.appendChild(tdO);
            tr.appendChild(tdN);
            tr.appendChild(tdC);
            table.appendChild(tr);
          }
        }
        section.appendChild(table);
        root.appendChild(section);
      }

      document.getElementById('footer').textContent =
        'Generated locally from git diff main...HEAD. Open this file in a browser; it is not committed to the repo.';
    }

    render();
  </script>
</body>
</html>
